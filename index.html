        body {
            font-family: 'Inter', sans-serif;
        }

            font-family: 'Source Serif 4', serif;
        }

        .animate-spin-slow {
            animation: spin 20s linear infinite;
        }

        .animate-reverse-spin {
            animation: reverse-spin 20s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes reverse-spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(-360deg); }
        }

        .pop-shadow {
            box-shadow: 0 4px 20px rgba(0,0,0,0.12), 0 1px 4px rgba(0,0,0,0.06);
        }

        .slide-transition {
            transition: all 0.5s ease-in-out;

        let currentIndex = 0;

        function renderSlide() {
            const slide = slides[currentIndex];
            const contentArea = document.getElementById('slide-content-area');
            const counter = document.getElementById('slide-counter');
            const scriptArea = document.getElementById('presenter-script');
            const dotIndicators = document.getElementById('dot-indicators');

            // Update Text & Main Content
            counter.innerText = `${currentIndex + 1}`;
            scriptArea.innerHTML = slide.script;

            contentArea.innerHTML = `
                ${slide.icon ? `<div class="transition-transform duration-500 scale-75 sm:scale-90 md:scale-100">${slide.icon}</div>` : ''}
                ${slide.title ? `<h1 class="text-xl sm:text-3xl md:text-4xl font-black text-slate-900 leading-tight max-w-2xl">${slide.title}</h1>` : ''}
                <div class="w-full max-w-full sm:max-w-md">
                    ${slide.content}
                </div>
            `;

            const mobileScript = document.getElementById('mobile-presenter-script');
            if (mobileScript) mobileScript.innerHTML = slide.script;

            // Update Dots
            dotIndicators.innerHTML = slides.map((_, i) => `
                <div class="h-1 rounded-full transition-all ${i === currentIndex ? 'w-4 bg-blue-600' : 'w-1 bg-slate-200'}"></div>
            `).join('');

            // Re-initialize Lucide icons for newly injected HTML
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        function nextSlide() {
            currentIndex = (currentIndex + 1) % slides.length;
            renderSlide();
        }

        function prevSlide() {
            currentIndex = (currentIndex - 1 + slides.length) % slides.length;
            renderSlide();
        }

        function toggleMobileScript() {
            const panel = document.getElementById('mobile-script-panel');
            const label = document.getElementById('mobile-script-label');
            const isHidden = panel.classList.toggle('hidden');
            label.textContent = isHidden ? 'Script' : 'Close';
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Enter') nextSlide();
            if (e.key === 'ArrowLeft') prevSlide();
        });

        // Initial render
        renderSlide();
    </script>
